<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmez votre email</title>
</head>
<body style="margin:0;padding:0;background-color:#180f24;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#180f24;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">

          <!-- Logo / App Name -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:28px;font-weight:300;font-style:italic;color:#ffb0f4;letter-spacing:0.5px;">Toi et Moi</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:rgba(255,255,255,0.06);border:1px solid rgba(255,173,249,0.12);border-radius:16px;padding:40px 32px;">

              <!-- Heart icon -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(255,173,249,0.2),rgba(255,119,255,0.2));text-align:center;line-height:56px;font-size:28px;">
                      &#x1F49C;
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Title -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:16px;">
                    <h1 style="margin:0;font-size:22px;font-weight:600;color:#f5e9ff;">Confirmez votre email</h1>
                  </td>
                </tr>
              </table>

              <!-- Description -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <p style="margin:0;font-size:15px;line-height:1.6;color:#bca8cf;max-width:380px;">
                      Bienvenue sur <strong style="color:#ffadf9;">Toi et Moi</strong>. Cliquez sur le bouton ci-dessous pour confirmer votre adresse email et activer votre espace.
                    </p>
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#ffadf9,#f793ff,#ff77ff);color:#37003a;font-size:16px;font-weight:700;text-decoration:none;border-radius:50px;letter-spacing:0.3px;">
                      Confirmer mon email
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-top:1px solid rgba(255,173,249,0.1);padding-top:24px;">
                    <p style="margin:0;font-size:13px;line-height:1.6;color:#8a7499;text-align:center;">
                      Si vous n'avez pas demande la creation de ce compte, ignorez simplement cet email.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="margin:0;font-size:12px;color:#6b5a7a;">
                nousdeux.website
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
